<!doctype html>
<html>
  <head></head>
  <body style="display: none">
    <script>
      function postMessage(type, message) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type, message }),
        );
      }

      // this emscripten listener must appear before opencv.js
      window.Module = {
        onRuntimeInitialized: () => postMessage("READY"),
      };

      // react native webview listener
      window.addEventListener("message", onMessage); // ios
      document.addEventListener("message", onMessage); // android

      function onMessage(event) {
        const msg = JSON.parse(event.data);
        if (msg.type !== "ANALYZE_RECEIPT" && msg.type !== "ANALYZE_SHELF") {
          return;
        }

        const img = new Image();
        img.onload = () => {
          try {
            const result = analyzeImage(img);
            postMessage("RESULT", result);
          } catch {
            postMessage("ERROR", "image analysis error");
          }
        };
        img.onerror = () => postMessage("ERROR", "image load error");
        img.src = "data:image/jpeg;base64," + msg.message;
      }
    </script>
    <script async src="https://docs.opencv.org/4.13.0/opencv.js"></script>
    <script>
      let canvas = null;
      let ctx = null;

      function initCanvas(w, h) {
        if (!canvas || canvas.width !== w || canvas.height !== h) {
          canvas = new OffscreenCanvas(w, h);
          ctx = canvas.getContext("2d", {
            willReadFrequently: true,
          });
        }
      }

      function analyzeImage(img) {
        // 1. Draw image to canvas (guaranteed 640×480 portrait)
        initCanvas(img.width, img.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // 2. Grayscale — kept alive for brightness check later
        let src = cv.matFromImageData(imgData);
        let gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        src.delete();

        // 3. Mild blur to reduce sensor noise
        let blurred = new cv.Mat();
        cv.GaussianBlur(gray, blurred, new cv.Size(3, 3), 0);

        // 4. Morphological gradient
        let grad = new cv.Mat();
        let morphKernel = cv.getStructuringElement(
          cv.MORPH_ELLIPSE,
          new cv.Size(3, 3),
        );
        cv.morphologyEx(blurred, grad, cv.MORPH_GRADIENT, morphKernel);
        morphKernel.delete();
        blurred.delete();

        // 5. Otsu binarization
        let binary = new cv.Mat();
        cv.threshold(grad, binary, 0, 255, cv.THRESH_BINARY | cv.THRESH_OTSU);
        grad.delete();

        // 6. Horizontal closing
        let closed = new cv.Mat();
        let closeKernel = cv.getStructuringElement(
          cv.MORPH_RECT,
          new cv.Size(15, 3),
        );
        cv.morphologyEx(binary, closed, cv.MORPH_CLOSE, closeKernel);
        closeKernel.delete();
        binary.delete();

        // 7. Contour detection
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(
          closed,
          contours,
          hierarchy,
          cv.RETR_EXTERNAL,
          cv.CHAIN_APPROX_SIMPLE,
        );

        const imgW = closed.cols;
        const imgH = closed.rows;
        const imageArea = imgW * imgH;

        // 8. Filter for text-line-shaped contours
        //    ── FIXES #2 (far) and #3 (close) ──
        let textRects = [];

        for (let i = 0; i < contours.size(); i++) {
          const cnt = contours.get(i);
          const rect = cv.boundingRect(cnt);
          const aspectRatio = rect.width / rect.height;
          const bboxArea = rect.width * rect.height;
          const areaRatio = bboxArea / imageArea;
          const contourArea = cv.contourArea(cnt);
          const fillRatio = contourArea / bboxArea;

          if (
            aspectRatio >= 1.8 &&
            aspectRatio <= 30 &&
            rect.height >= 5 && // was 8  — lets small far-away text through
            rect.height <= imgH * 0.25 && // was 0.12 — lets large close-up text through
            rect.width >= 12 && // was 20  — matches smaller far-away lines
            areaRatio >= 0.0008 &&
            areaRatio <= 0.25 && // was 0.2  — accommodates large close-up lines
            fillRatio >= 0.3
          ) {
            textRects.push(rect);
          }
        }

        // 9. Structural validation and classification
        let label = "notFound";
        const MIN_TEXT_REGIONS = 5;

        if (textRects.length >= MIN_TEXT_REGIONS) {
          // ── Combined bounding box ──
          let minX = Infinity,
            minY = Infinity;
          let maxX = 0,
            maxY = 0;
          let totalTextArea = 0;
          let heights = [];

          for (const r of textRects) {
            minX = Math.min(minX, r.x);
            minY = Math.min(minY, r.y);
            maxX = Math.max(maxX, r.x + r.width);
            maxY = Math.max(maxY, r.y + r.height);
            totalTextArea += r.width * r.height;
            heights.push(r.height);
          }

          const combinedW = maxX - minX;
          const combinedH = maxY - minY;
          const combinedArea = combinedW * combinedH;
          const coverage = combinedArea / imageArea;

          // ── Text density ──
          const textDensity = totalTextArea / combinedArea;

          // ── Left-alignment ──
          const X_TOLERANCE = imgW * 0.06;
          const xBins = {};
          let maxAligned = 0;
          for (const r of textRects) {
            const binKey = Math.round(r.x / X_TOLERANCE);
            xBins[binKey] = (xBins[binKey] || 0) + 1;
            maxAligned = Math.max(maxAligned, xBins[binKey]);
          }
          const alignmentRatio = maxAligned / textRects.length;

          // ── Height consistency ──
          heights.sort((a, b) => a - b);
          const medianHeight = heights[Math.floor(heights.length / 2)];
          const consistentCount = heights.filter(
            (h) => h >= medianHeight * 0.5 && h <= medianHeight * 1.8,
          ).length;
          const heightConsistency = consistentCount / heights.length;

          // ── Combined aspect ratio ──
          const combinedAspect = combinedW / combinedH;

          // ── Background brightness ──
          let brightPixels = 0;
          let totalSampled = 0;
          const step = 4;
          for (
            let y = Math.max(0, Math.floor(minY));
            y < Math.min(imgH, Math.ceil(maxY));
            y += step
          ) {
            for (
              let x = Math.max(0, Math.floor(minX));
              x < Math.min(imgW, Math.ceil(maxX));
              x += step
            ) {
              totalSampled++;
              if (gray.ucharAt(y, x) > 160) brightPixels++;
            }
          }
          const brightnessRatio =
            totalSampled > 0 ? brightPixels / totalSampled : 0;

          // ── Edge clipping (bounding-box level, kept for large-coverage check) ──
          const EDGE_THRESHOLD = 0.03;
          let clippedEdges = 0;
          if (minX / imgW < EDGE_THRESHOLD) clippedEdges++;
          if ((imgW - maxX) / imgW < EDGE_THRESHOLD) clippedEdges++;
          if (minY / imgH < EDGE_THRESHOLD) clippedEdges++;
          if ((imgH - maxY) / imgH < EDGE_THRESHOLD) clippedEdges++;

          // ── FIX #1: Per-region edge-touch detection ──
          // If 3+ individual text rects are cut off at the same frame edge,
          // the receipt is running out of frame on that side.
          const EDGE_TOUCH_PX = 3;
          const TOUCH_MIN = 3;
          let touchLeft = 0,
            touchRight = 0,
            touchTop = 0,
            touchBottom = 0;

          for (const r of textRects) {
            if (r.x <= EDGE_TOUCH_PX) touchLeft++;
            if (r.x + r.width >= imgW - EDGE_TOUCH_PX) touchRight++;
            if (r.y <= EDGE_TOUCH_PX) touchTop++;
            if (r.y + r.height >= imgH - EDGE_TOUCH_PX) touchBottom++;
          }

          const textCutOff =
            touchLeft >= TOUCH_MIN ||
            touchRight >= TOUCH_MIN ||
            touchTop >= TOUCH_MIN ||
            touchBottom >= TOUCH_MIN;

          // ── Receipt-likeness gate ──
          const isReceiptLike =
            textDensity >= 0.06 && // was 0.08 — slightly relaxed for sparse far-away text
            alignmentRatio >= 0.3 &&
            heightConsistency >= 0.5 &&
            brightnessRatio >= 0.35 &&
            combinedAspect <= 2.5;

          // ── Classification ──
          if (!isReceiptLike) {
            label = "notFound";
          } else if (coverage < 0.1) {
            label = "tooFar";
          } else if (textCutOff || (coverage > 0.55 && clippedEdges >= 2)) {
            // textCutOff catches partial off-frame (any direction, any coverage ≥ 0.10)
            // The second condition catches extreme close-ups filling the whole frame
            label = "tooClose";
          } else {
            label = "good";
          }

          postMessage("LOG", {
            width: img.width,
            height: img.height,
            coverage: +coverage.toFixed(4),
            clippedEdges,
            regionCount: textRects.length,
            textDensity: +textDensity.toFixed(4),
            alignmentRatio: +alignmentRatio.toFixed(4),
            heightConsistency: +heightConsistency.toFixed(4),
            brightnessRatio: +brightnessRatio.toFixed(4),
            combinedAspect: +combinedAspect.toFixed(4),
            touchEdges: { touchLeft, touchRight, touchTop, touchBottom },
            textCutOff,
            label,
          });
        } else {
          postMessage("LOG", {
            width: img.width,
            height: img.height,
            regionCount: textRects.length,
            label,
          });
        }

        // 10. Cleanup
        gray.delete();
        closed.delete();
        contours.delete();
        hierarchy.delete();

        return label;
      }
    </script>
  </body>
</html>
